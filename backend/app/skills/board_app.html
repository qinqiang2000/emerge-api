<!doctype html>
<!-- emerge MCP Apps audit board (B5b) — rendered in a sandboxed iframe by
     Claude / Claude Desktop. Self-contained: no deps, hand-rolled
     ui/initialize postMessage handshake. The host pushes the
     read_audit_report tool result; we read the board-view capability URL
     from its text, redeem it for {report, docs, locations}, and draw the
     same magenta dashed-circle board the web UI settled on (2026-06-11).
     Red line: locate rects live only inside this iframe.
     Geometry comes from board_geometry.js, injected at serve time into the
     placeholder script block below (mcp_server.py::_board_app_html) — this
     file must NOT hand-write geometry formulas/constants again (plan §G2). -->
<html lang="zh">
<head>
<meta charset="utf-8">
<title>audit board</title>
<style>
  :root { --ink: #1b1a16; --ink3: #6b6258; --paper: #faf8f4; --rule: #e5e0d8;
          --mark: #d6219c; --amber: #d97706; --moss: #7c8c4d; --rose: #b54a48; }
  * { box-sizing: border-box; margin: 0 }
  body { font: 13px/1.5 system-ui, sans-serif; color: var(--ink);
         background: var(--paper); height: 100vh; display: flex; overflow: hidden }
  #rail { width: 280px; flex: none; border-right: 1px solid var(--rule);
          overflow-y: auto; background: #fff }
  #rail h3 { font-size: 13px; padding: 8px 10px; border-bottom: 1px solid var(--rule);
             position: sticky; top: 0; background: #fff }
  #railTg { float: right; border: 1px solid var(--rule); background: #fff;
            border-radius: 4px; padding: 0 6px; cursor: pointer; color: var(--ink3);
            font-size: 12px; line-height: 18px }
  body.compact #railTg { float: none }
  .chk { padding: 8px 10px; border-bottom: 1px solid var(--rule); cursor: pointer }
  .chk:hover { background: var(--paper) }
  .chk.on { background: #f5efe2; border-left: 3px solid var(--mark); padding-left: 7px }
  .chk .g { margin-right: 5px; font-weight: 700 }
  .g.p { color: var(--moss) } .g.f { color: var(--rose) } .g.u { color: var(--amber) }
  .chk .q { color: var(--ink3); font-size: 11px; padding-left: 14px; word-break: break-all }
  .chk .num { display: none }
  /* compact rail (short iframe): numbers-only strip, still clickable —
     every pixel goes to the canvas */
  body.compact #rail { width: 46px }
  body.compact #rail h3 .ttl, body.compact #rail h3 #tally { display: none }
  body.compact #rail h3 { padding: 8px 6px; text-align: center }
  body.compact .chk { padding: 6px 4px; text-align: center }
  body.compact .chk .t, body.compact .chk .q { display: none }
  body.compact .chk .num { display: inline; font-weight: 600 }
  body.compact .chk .g { margin-right: 2px }
  #stage { flex: 1; position: relative; overflow: hidden; cursor: grab }
  #stage.drag { cursor: grabbing }
  #world { position: absolute; transform-origin: 0 0 }
  .pg { position: absolute; box-shadow: 0 1px 4px rgba(27,26,22,.18); background: #fff }
  .pg img { display: block; width: 100%; height: 100% }
  .cap { position: absolute; font: 11px monospace; color: var(--ink3);
         transform: translateY(-16px) }
  svg.ov { position: absolute; left: 0; top: 0;
           pointer-events: none; overflow: visible }
  #hud { position: absolute; bottom: 10px; left: 10px; background: #fff;
         border: 1px solid var(--rule); border-radius: 4px; padding: 2px 8px;
         font: 11px monospace; color: var(--ink3) }
  #msg { margin: auto; color: var(--ink3); font-family: monospace }
</style>
</head>
<body>
<div id="rail" hidden><h3><span class="ttl">checks</span> <span id="tally"></span><button id="railTg" title="收起/展开">«</button></h3><div id="rows"></div></div>
<div id="stage"><div id="world"></div><div id="hud" hidden></div><div id="msg">initializing…</div></div>
<script>
/* 几何单真相注入位：serve 时 mcp_server.py::_board_app_html 把下行占位替换为
   board_geometry.js 全文（classic script → 之后 globalThis.BoardGeom 可用）。 */
/*__BOARD_GEOMETRY_JS__*/
</script>
<script>
"use strict";
/* ── minimal MCP Apps host bridge ─────────────────────────────────────── */
let seq = 0; const pending = {};
function rpc(method, params, timeoutMs) {
  return new Promise(res => {
    const id = ++seq; pending[id] = res;
    window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
    if (timeoutMs) setTimeout(() => {
      if (pending[id]) { delete pending[id]; res(undefined); } // host didn't answer
    }, timeoutMs);
  });
}
const toolResults = [];
window.addEventListener("message", ev => {
  const m = ev.data;
  if (!m || m.jsonrpc !== "2.0") return;
  if (m.id && pending[m.id]) { pending[m.id](m.result); delete pending[m.id]; return; }
  // tool results arrive as ui/* notifications; shapes vary by host version —
  // sniff anything carrying content blocks.
  const p = m.params || {};
  const content = (p.result && p.result.content) || p.content;
  if (Array.isArray(content)) { toolResults.push(content); tryBoot(); }
});

/* ── boot: find the capability URL in the tool result text ────────────── */
let booted = false;
function setMsg(t) { const el = document.getElementById("msg"); if (el) el.textContent = t; }
function tryBoot() {
  if (booted) return;
  for (const content of toolResults) {
    for (const block of content) {
      if (block.type !== "text" || typeof block.text !== "string") continue;
      const m = block.text.match(/https?:\/\/\S+\/lab\/board-view\/[\w\-.~]+/);
      if (m) { booted = true; boot(m[0]); return; }
    }
  }
}
async function boot(viewUrl) {
  setMsg("loading board…");
  let data;
  try {
    const r = await fetch(viewUrl);
    if (!r.ok) throw new Error("HTTP " + r.status);
    data = await r.json();
  } catch (e) { setMsg("board unavailable: " + e.message); booted = false; return; }
  render(viewUrl, data);
}

/* ── geometry: injected board_geometry.js is the single source of truth ─ */
const { GEOM } = BoardGeom;

function render(viewUrl, data) {
  const report = data.report || {}, checks = report.checks || [];
  // few-paged docs first — same heuristic as the web board: anchor docs
  // cluster left, a long appendix goes right, cross-doc fits stay tight
  const docs = (data.docs || []).slice().sort((a, b) => (a.pages || 1) - (b.pages || 1));
  const locations = data.locations || {};
  document.getElementById("msg").remove();
  const rail = document.getElementById("rail"); rail.hidden = false;
  document.getElementById("hud").hidden = false;

  /* rail */
  const glyph = s => s === "pass" ? "✓" : s === "fail" ? "✗" : "?";
  const gcls = s => s === "pass" ? "p" : s === "fail" ? "f" : "u";
  document.getElementById("tally").textContent =
    checks.filter(c => c.status === "pass").length + "/" + checks.length;
  const rows = document.getElementById("rows");
  checks.forEach((c, i) => {
    const d = document.createElement("div");
    d.className = "chk"; d.dataset.i = i;
    const evs = (c.evidence || []).map(e =>
      `<div class="q">「${(e.quote || "").slice(0, 60)}」— ${e.doc || ""}</div>`).join("");
    d.title = (c.rule || "");
    d.innerHTML = `<span class="g ${gcls(c.status)}">${glyph(c.status)}</span>` +
      `<span class="num">${i + 1}</span><span class="t">${c.rule || ""}</span>${evs}`;
    d.onclick = () => focusCheck(i);
    rows.appendChild(d);
  });

  /* pages: layout via shared BoardGeom.layoutPages + lazy img.
     A4-ish placeholder dims; corrected when each img loads. laid value shape
     {doc,page,x,y,w,h,k} 与共享版一致——k 此处 = pxPerPtFor(ext)×SCALE，
     drawOverlay 在 img onload 后用 srcScale 重推 k（只影响 overlay，不动布局）。 */
  const world = document.getElementById("world");
  const laid = BoardGeom.layoutPages(docs.map(d => ({
    name: d.doc, ext: d.ext,
    pages: Array.from({ length: d.pages || 1 }, (_, j) => ({ page: j + 1, w: 1240, h: 1754 })),
  })), GEOM.SCALE);
  for (const [key, pg] of laid) {
    const host = document.createElement("div");
    host.className = "pg"; host.dataset.key = key;
    host.style.cssText = `left:${pg.x}px;top:${pg.y}px;width:${pg.w}px;height:${pg.h}px`;
    const cap = document.createElement("div");
    cap.className = "cap"; cap.textContent = `${pg.doc} · p${pg.page}`;
    host.appendChild(cap);
    const img = new Image();
    img.loading = "lazy";
    img.src = `${viewUrl}/pages/${encodeURIComponent(pg.doc)}/${pg.page}`;
    img.onload = () => { // correct aspect (x stays; board is column-flow so y drift is tolerable)
      const h = img.naturalHeight * (pg.w / img.naturalWidth);
      pg.h = h; host.style.height = h + "px"; pg.iw = img.naturalWidth;
      sizeSvg(); drawOverlay(); };
    host.appendChild(img);
    world.appendChild(host);
  }

  /* cited-docs-adjacent reflow (same UX as the web board): on focus, the
     check's cited docs move to the front (few-paged first) and cited pages
     bubble to each doc's leading sub-column — a cross-doc pair must sit
     side by side, not a band apart (dogfood 2026-06-11). */
  function reflow(order) { // order: [{doc, pages: [pageNo, ...]}]
    // 复用共享 layoutPages 重摆（layoutPages 吃源尺寸：laid 存的是已×SCALE 的
    // 板尺寸，反除 SCALE 还原；onload 校正过的 pg.h 由此自然带进重排），
    // 再把返回的 x/y 写回 laid 与 DOM——w/h/k 不动。
    const byName = Object.fromEntries(docs.map(d => [d.doc, d]));
    const relaid = BoardGeom.layoutPages(order.map(o => ({
      name: o.doc, ext: (byName[o.doc] || {}).ext,
      pages: o.pages
        .map(pn => {
          const pg = laid.get(BoardGeom.pageKey(o.doc, pn));
          return pg ? { page: pn, w: pg.w / GEOM.SCALE, h: pg.h / GEOM.SCALE } : null;
        })
        .filter(Boolean),
    })), GEOM.SCALE);
    for (const [key, npos] of relaid) {
      const pg = laid.get(key);
      if (!pg) continue;
      pg.x = npos.x; pg.y = npos.y;
      const host = world.querySelector(`[data-key="${CSS.escape(key)}"]`);
      if (host) { host.style.left = pg.x + "px"; host.style.top = pg.y + "px"; }
    }
  }
  function reflowForCheck(i) {
    const cited = [];
    for (const e of (checks[i] && checks[i].evidence) || []) {
      if (e && e.doc && !cited.includes(e.doc)) cited.push(e.doc);
    }
    if (cited.length < 2) return;
    const citedPages = {};
    Object.entries(locations).forEach(([key, loc]) => {
      if (Number(key.split("-")[0]) !== i || !loc.page) return;
      (citedPages[loc.doc] = citedPages[loc.doc] || []).push(loc.page);
    });
    const byName = Object.fromEntries(docs.map(d => [d.doc, d]));
    const orderDocs = [
      ...cited.filter(d => byName[d]).sort((a, b) => (byName[a].pages || 1) - (byName[b].pages || 1)),
      ...docs.map(d => d.doc).filter(d => !cited.includes(d)),
    ];
    reflow(orderDocs.map(name => {
      const total = (byName[name] && byName[name].pages) || 1;
      const all = Array.from({ length: total }, (_, k) => k + 1);
      const front = (citedPages[name] || []).filter(pn => all.includes(pn));
      return { doc: name, pages: [...front, ...all.filter(pn => !front.includes(pn))] };
    }));
    sizeSvg();
  }

  /* overlay svg — explicit world-sized viewport (an unsized absolute svg
     computes 0x0 inside #world and renders nothing) */
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("class", "ov");
  function sizeSvg() {
    let W = 100, H = 100;
    for (const pg of laid.values()) { W = Math.max(W, pg.x + pg.w + 200); H = Math.max(H, pg.y + pg.h + 200); }
    svg.setAttribute("width", W); svg.setAttribute("height", H);
  }
  sizeSvg();
  world.appendChild(svg);
  let active = -1;
  let tx = 20, ty = 20, zoom = 0.2;
  function drawOverlay() {
    svg.innerHTML = "";
    if (active < 0) return;
    const ellipses = [];
    Object.entries(locations).forEach(([key, loc]) => {
      const [ci] = key.split("-").map(Number);
      if (ci !== active || !loc.rects || !loc.rects.length) return;
      const pg = laid.get(BoardGeom.pageKey(loc.doc, loc.page || 1));
      if (!pg) return;
      // rect (pt or px) -> board px. img display width == pg.w; source width
      // = naturalWidth; pdf rects are points: px = pt×dpi/72, then × pg.w/iw.
      // iframe 特有：k 用 srcScale 校正（非布局占位的 k）——喂给共享
      // evidenceEllipse 的 pageLike 必须带这个 k。
      const srcScale = pg.iw ? pg.w / pg.iw : GEOM.SCALE;
      const k = BoardGeom.pxPerPtFor(pg.doc.toLowerCase().endsWith(".pdf") ? "pdf" : "img") * srcScale;
      const el = BoardGeom.evidenceEllipse(loc.rects, { x: pg.x, y: pg.y, k });
      if (!el) return;
      const e = document.createElementNS(svg.namespaceURI, "ellipse");
      e.setAttribute("cx", el.cx); e.setAttribute("cy", el.cy);
      e.setAttribute("rx", el.rx); e.setAttribute("ry", el.ry);
      e.setAttribute("fill", "none"); e.setAttribute("stroke", "var(--mark)");
      // screen-constant stroke: divide by zoom (vector-effect can't see the
      // ancestor CSS transform, so compensate manually on every redraw)
      e.setAttribute("stroke-width", String(GEOM.STROKE_W / zoom));
      e.setAttribute("stroke-dasharray", `${GEOM.DASH_ON / zoom} ${GEOM.DASH_OFF / zoom}`);
      svg.appendChild(e);
      ellipses.push({ cx: el.cx, cy: el.cy, rx: el.rx, ry: el.ry, doc: pg.doc });
    });
    // consecutive cross-doc pairs + rim-to-rim trim — shared BoardGeom math
    for (const [a, b] of BoardGeom.crossDocPairs(ellipses)) {
      const t = BoardGeom.rayEllipseTrim(a, b, GEOM.ARROW_GAP);
      if (!t) continue; // coincident centers — nothing to draw
      const l = document.createElementNS(svg.namespaceURI, "line");
      l.setAttribute("x1", t.sx); l.setAttribute("y1", t.sy);
      l.setAttribute("x2", t.ex); l.setAttribute("y2", t.ey);
      l.setAttribute("stroke", "var(--mark)");
      l.setAttribute("stroke-width", String(GEOM.STROKE_ARROW / zoom));
      l.setAttribute("stroke-dasharray", `${GEOM.DASH_ON / zoom} ${GEOM.DASH_OFF / zoom}`);
      svg.appendChild(l);
    }
    return ellipses;
  }

  /* pan/zoom */
  const stage = document.getElementById("stage"), hud = document.getElementById("hud");
  let zoomRaf = 0;
  function apply() {
    world.style.transform = `translate(${tx}px,${ty}px) scale(${zoom})`;
    hud.textContent = Math.round(zoom * 100) + "%";
    // keep stroke screen-constant across zoom changes (cheap: few elements)
    cancelAnimationFrame(zoomRaf);
    zoomRaf = requestAnimationFrame(() => drawOverlay());
  }
  stage.addEventListener("wheel", ev => {
    ev.preventDefault();
    const f = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
    const r = stage.getBoundingClientRect();
    const mx = ev.clientX - r.left, my = ev.clientY - r.top;
    tx = mx - (mx - tx) * f; ty = my - (my - ty) * f; zoom *= f;
    apply();
  }, { passive: false });
  let drag = null;
  stage.addEventListener("pointerdown", ev => {
    // buttons/HUD live inside #stage: capturing their pointerdown redirects
    // the click to the stage and the button NEVER fires (dogfood: ⛶ looked
    // dead for three rounds — HUD showed no fs-click)
    if (ev.target.closest("button")) return;
    drag = { x: ev.clientX - tx, y: ev.clientY - ty };
    stage.classList.add("drag"); stage.setPointerCapture(ev.pointerId);
  });
  stage.addEventListener("pointermove", ev => {
    if (drag) { tx = ev.clientX - drag.x; ty = ev.clientY - drag.y; apply(); }
  });
  stage.addEventListener("pointerup", () => { drag = null; stage.classList.remove("drag"); });

  function focusCheck(i) {
    active = i;
    document.querySelectorAll(".chk").forEach(el =>
      el.classList.toggle("on", Number(el.dataset.i) === i));
    reflowForCheck(i);
    if (window.dbg) dbg("check#" + (i + 1));
    const ellipses = drawOverlay() || [];
    if (!ellipses.length) return;
    // fit viewport to the circles (+page context margin)
    let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
    for (const e of ellipses) {
      x0 = Math.min(x0, e.cx - 350); y0 = Math.min(y0, e.cy - 250);
      x1 = Math.max(x1, e.cx + 350); y1 = Math.max(y1, e.cy + 250);
    }
    const r = stage.getBoundingClientRect();
    zoom = Math.min(r.width / (x1 - x0), r.height / (y1 - y0), 1.4);
    tx = (r.width - (x1 - x0) * zoom) / 2 - x0 * zoom;
    ty = (r.height - (y1 - y0) * zoom) / 2 - y0 * zoom;
    apply();
  }

  apply();
  // short/narrow iframe → numbers-only rail; the user's manual toggle (the
  // « button) overrides the heuristic for the rest of the session
  let railManual = null; // null = auto
  const compact = () => {
    const on = railManual !== null ? railManual
      : (window.innerHeight < 560 || window.innerWidth < 1150);
    document.body.classList.toggle("compact", on);
    const tg = document.getElementById("railTg");
    if (tg) tg.textContent = on ? "»" : "«";
  };
  compact();
  window.addEventListener("resize", compact);
  document.getElementById("railTg").onclick = () => {
    railManual = !document.body.classList.contains("compact");
    compact();
    if (window.dbg) dbg("rail " + (railManual ? "min" : "max"));
  };
  // debug HUD: build + last event (a screenshot becomes a bug report)
  const dbgEl = document.createElement("div");
  dbgEl.style.cssText = "position:absolute;bottom:10px;right:10px;font:10px monospace;" +
    "color:var(--ink3);background:#fff;border:1px solid var(--rule);border-radius:4px;padding:1px 6px";
  dbgEl.textContent = "v10";
  document.getElementById("stage").appendChild(dbgEl);
  window.dbg = t => { dbgEl.textContent = "v10 · " + t; };
  if (window.__embedded) {
    // default in-chat frame is short (~200px) — report a workable board
    // height; ResizeObserver keeps it honest if the host resizes us.
    window.parent.postMessage({ jsonrpc: "2.0",
      method: "ui/notifications/size-changed",
      params: { width: Math.max(document.body.clientWidth || 0, 900), height: 720 } }, "*");
    // fullscreen affordance — the board is a workspace, not a thumbnail
    const fs = document.createElement("button");
    fs.textContent = "⛶";
    fs.title = "fullscreen";
    fs.textContent = "⛶ 放大";
    fs.style.cssText = "position:absolute;bottom:10px;left:64px;z-index:10;" +
      "background:#fff;border:1px solid var(--rule);border-radius:4px;" +
      "padding:2px 8px;cursor:pointer;font-size:12px;color:var(--ink3)";
    let fsOn = false;
    const sizeNote = h => window.parent.postMessage({ jsonrpc: "2.0",
      method: "ui/notifications/size-changed",
      params: { width: Math.max(document.body.clientWidth || 0, 900), height: h } }, "*");
    fs.onclick = async () => {
      fsOn = !fsOn;
      dbg("fs-click " + (fsOn ? "grow" : "restore"));
      fs.textContent = fsOn ? "🗗 还原" : "⛶ 放大"; // immediate feedback either way
      const r = await rpc("ui/request-display-mode",
        { mode: fsOn ? "fullscreen" : "inline" }, 800);
      if (r && r.mode) {
        fsOn = r.mode === "fullscreen";
        fs.textContent = fsOn ? "🗗 还原" : "⛶ 放大";
        dbg("display-mode→" + r.mode);
      } else {
        // host doesn't implement display-mode (dogfood: Cowork ignored it) —
        // fall back to growing the frame via size-changed, which it does honor
        const h = fsOn ? Math.max((window.screen && window.screen.availHeight || 1200) - 240, 900) : 720;
        sizeNote(h);
        dbg("no display-mode; size→" + h);
      }
    };
    document.getElementById("stage").appendChild(fs);
  }
  // open on the first check that has located evidence
  const first = checks.findIndex((_, i) =>
    Object.keys(locations).some(k => Number(k.split("-")[0]) === i));
  if (first >= 0) setTimeout(() => focusCheck(first), 300);
}

/* entry dispatch — after all declarations (let `booted` is TDZ-bound) */
/* Dual-mode: served standalone at /lab/board-view/{token} (browser nav →
   the route returns this HTML; our fetch of the same URL returns JSON), or
   inside an MCP Apps iframe (boot from the host-pushed tool result). */
if (/\/lab\/board-view\//.test(window.location.pathname)) {
  booted = true;
  boot(window.location.href.split("#")[0].split("?")[0]);
} else {
  window.__embedded = true;
  rpc("ui/initialize", { appInfo: { name: "emerge-audit-board", version: "1.0.0" },
                         capabilities: {} })
    .then(() => {
      window.parent.postMessage(
        { jsonrpc: "2.0", method: "ui/notifications/initialized" }, "*");
      setMsg("waiting for audit report…");
      tryBoot();
    });
}
</script>
</body>
</html>

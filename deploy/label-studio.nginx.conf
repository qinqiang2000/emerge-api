# label-studio — moved OFF the public domain to plain HTTP on :9090.
#
# 2026-06-07 port swap: emerge took over fpydoc.duckdns.org on :80/:443 (see
# emerge.nginx.conf); label-studio now answers only on :9090. Reach it directly
# at http://<host>:9090 — there is no TLS / domain / 80→443 redirect here
# anymore (those moved to the emerge block). The ACME challenge location also
# moved to emerge's :80 block, which is the only :80 default_server now.
#
# Installed by deploy.sh → /etc/nginx/conf.d/label-studio.conf. Kept in the
# emerge repo so the swapped pair stays coupled and never drifts back into a
# duplicate-default_server collision.
upstream label_studio_app {
  server unix:/run/label-studio.sock;
  keepalive 32;
}

server {
  listen 9090;
  listen [::]:9090;
  server_name _;

  client_max_body_size 1024m;
  keepalive_timeout 75s;

  # Compression — Brotli (loaded as a dynamic module) for modern browsers,
  # gzip as fallback.
  brotli on;
  brotli_comp_level 5;
  brotli_min_length 1024;
  brotli_static on;
  brotli_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json application/wasm
               font/woff2 font/woff;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json
             image/svg+xml application/manifest+json application/wasm
             font/woff2 font/woff;

  # ---------- frontend bundles served directly by nginx ----------
  location /react-app/ {
    alias /root/miniconda3/envs/ls-env/lib/python3.10/site-packages/web/dist/apps/labelstudio/;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
    try_files $uri =404;
  }

  location /dm/ {
    alias /root/miniconda3/envs/ls-env/lib/python3.10/site-packages/web/dist/libs/datamanager/;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
    try_files $uri =404;
  }

  location /editor/ {
    alias /root/miniconda3/envs/ls-env/lib/python3.10/site-packages/web/dist/libs/editor/;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
    try_files $uri =404;
  }

  location /label-studio-frontend/ {
    alias /root/miniconda3/envs/ls-env/lib/python3.10/site-packages/web/dist/libs/editor/;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
    try_files $uri =404;
  }

  # ---------- task media (local files) → gunicorn, BUFFERED ----------
  location /data/local-files/ {
    proxy_pass http://label_studio_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 600s;

    proxy_buffering on;
    proxy_buffer_size 32k;
    proxy_buffers 64 32k;
    proxy_busy_buffers_size 512k;
    proxy_max_temp_file_size 1024m;
  }

  # Internal target for X-Accel-Redirect emitted by the localfiles_data view.
  location /internal-local-files/ {
    internal;
    alias /root/label_studio/dataset/;
    add_header Cache-Control "private, max-age=300" always;
    access_log off;
  }

  # ---------- everything else → gunicorn ----------
  location / {
    proxy_pass http://label_studio_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_buffering off;
    proxy_request_buffering off;
  }
}

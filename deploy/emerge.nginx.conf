# emerge frontend — static SPA on :9090, API proxied to the local backend.
#
# Installed by deploy.sh → /etc/nginx/conf.d/emerge.conf. Replaces the old
# `vite preview` node server (emerge-web.service), which served every asset
# with `Cache-Control: no-cache` and couldn't set per-path headers. Coexists
# with the label-studio server block (it owns :80/:443; this owns :9090).
server {
    listen 9090;
    listen [::]:9090;
    server_name _;

    root /root/emerge/frontend/dist;
    index index.html;

    # On-the-fly gzip (the host nginx has no brotli module). Proxied/streaming
    # responses are left untouched — gzip_proxied is off by default, and SSE's
    # text/event-stream isn't in this type list, so token streaming is safe.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Hashed build assets are content-addressed (the filename changes whenever
    # the bytes do) → cache hard and skip revalidation entirely. This is the
    # fix for the old no-cache behavior.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html is the un-hashed entry point — must always revalidate so a new
    # deploy's fresh asset hashes are picked up on the next load.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API → local uvicorn backend. Mirrors vite's old preview.proxy set.
    # proxy_buffering off keeps chat token streaming (SSE) flowing unbuffered.
    location ~ ^/(lab|v1|auth|healthz)(/|$) {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — client-side routes (/p/<slug>, /c/<cid>) resolve to the
    # entry document; the app reads the path from the address bar on mount.
    location / {
        try_files $uri /index.html;
    }
}

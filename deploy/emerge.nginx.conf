# emerge frontend — now owns the primary domain fpydoc.duckdns.org on :80/:443.
#
# Installed by deploy.sh → /etc/nginx/conf.d/emerge.conf. Static SPA served by
# nginx; API + SSE proxied to the local backend on 127.0.0.1:8080.
#
# 2026-06-07 port swap: emerge took over the public domain (:80/:443) from
# label-studio, which moved to plain HTTP on :9090 (deploy/label-studio.nginx.conf).
# Both servers share this one nginx — `nginx -t` gates every reload so a bad
# config can never drop the other. The two configs are coupled: only ONE block
# may carry `default_server` per port, so they must be swapped together.

# --- HTTP :80 → 301 to HTTPS, but keep ACME HTTP-01 reachable ----------------
# The Let's Encrypt renewal challenge MUST stay served here (it moved off the
# old label-studio :80 block during the swap); without it cert renewal breaks.
server {
    listen 80 default_server;
    server_name fpydoc.duckdns.org _;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 + HTTP/2 -----------------------------------------------------
server {
    listen 443 ssl http2 default_server;
    server_name fpydoc.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/fpydoc.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fpydoc.duckdns.org/privkey.pem;

    # Modern TLS only (mirrors the retired label-studio block).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # HSTS — same domain already trained browsers to expect HTTPS, so keep it.
    add_header Strict-Transport-Security "max-age=15768000" always;

    root /root/emerge/frontend/dist;
    index index.html;

    # Document uploads can be large (scanned PDFs); match label-studio's old cap.
    client_max_body_size 1024m;

    # On-the-fly gzip (the host nginx has no brotli module). Proxied/streaming
    # responses are left untouched — gzip_proxied is off by default, and SSE's
    # text/event-stream isn't in this type list, so token streaming is safe.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Hashed build assets are content-addressed (the filename changes whenever
    # the bytes do) → cache hard and skip revalidation entirely.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html is the un-hashed entry point — must always revalidate so a new
    # deploy's fresh asset hashes are picked up on the next load.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API → local uvicorn backend. proxy_buffering off keeps chat token
    # streaming (SSE) — and the /mcp Streamable-HTTP transport — flowing
    # unbuffered. The alternation also carries the OAuth 2.0 custom-connector
    # surface (P2): /mcp + the authorization-server endpoints (/authorize /token
    # /register /revoke /oauth/consent) + RFC 8414/9728 `.well-known/oauth-*`
    # metadata. Without these the SPA fallback below would answer them with
    # index.html and the Claude client's `initialize` would choke on non-JSON.
    # `auth(/|$)` only matches /auth, NOT /authorize — so each is listed.
    location ~ ^/((lab|v1|auth|healthz|mcp|oauth|authorize|token|register|revoke)(/|$)|\.well-known/oauth-) {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — client-side routes (/p/<slug>, /c/<cid>) resolve to the
    # entry document; the app reads the path from the address bar on mount.
    location / {
        try_files $uri /index.html;
    }
}
